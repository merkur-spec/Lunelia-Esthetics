<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password - Lunelia Esthetics</title>
    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500&family=Montserrat:wght@300;400;500&display=swap" rel="stylesheet">
</head>
<body>
<a class="skip-link" href="#main-content">Skip to main content</a>

<header>
    <div class="header-actions" aria-label="Site navigation">
        <a class="top-home-btn" href="index.html">Home</a>
        <details class="top-menu">
            <summary>Menu</summary>
            <div class="top-menu-list">
                <a href="about.html">About Us</a>
                <a href="contact.html">Contact</a>
                <a href="specials.html">Specials</a>
                <a href="client.html">Sign In</a>
            </div>
        </details>
    </div>
    <h1>Lunelia Esthetics</h1>
    <h2 id="reset-page-subtitle">Reset Password</h2>
</header>

<main id="main-content" class="booking-container admin-layout">
    <section class="client-info admin-login-section">
        <h3 id="reset-page-title">Request Reset Link</h3>
        <div id="forgot-panel">
            <form id="forgot-password-form" novalidate>
                <div class="field-group">
                    <label for="forgot-email">Email</label>
                    <input type="email" id="forgot-email" required>
                </div>
                <button type="submit">Send Reset Email</button>
            </form>
        </div>

        <div id="reset-panel" hidden>
            <p class="section-subtitle">This form is available only through your emailed reset link.</p>
            <form id="reset-password-form" novalidate>
                <input type="hidden" id="reset-email" required>
                <input type="hidden" id="reset-token" required>
                <div class="field-group">
                    <label for="reset-password">New Password (8+ characters)</label>
                    <input type="password" id="reset-password" minlength="8" required>
                </div>
                <div class="field-group">
                    <label for="reset-password-confirm">Confirm New Password</label>
                    <input type="password" id="reset-password-confirm" minlength="8" required>
                </div>
                <button type="submit">Update Password</button>
            </form>
        </div>

        <p id="reset-message" class="form-message" role="status" aria-live="polite"></p>
    </section>
</main>

<script src="reset-password.js?v=20260319"></script>
<script src="auth-menu.js"></script>
</body>
</html>
