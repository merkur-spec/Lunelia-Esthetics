<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Client Portal - Lunelia Esthetics</title>
    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500&family=Montserrat:wght@300;400;500&display=swap" rel="stylesheet">
</head>
<body class="client-page">
<a class="skip-link" href="#main-content">Skip to main content</a>

<header>
    <div class="header-actions" aria-label="Site navigation">
        <a class="top-home-btn" href="index.html">Home</a>
        <details class="top-menu">
            <summary>Menu</summary>
            <div class="top-menu-list">
                <a href="about.html">About Us</a>
                <a href="contact.html">Contact</a>
                <a href="specials.html">Specials</a>
                <a href="client.html">Sign In</a>
            </div>
        </details>
    </div>
    <h1>Lunelia Esthetics</h1>
    <h2>Client Portal</h2>
</header>

<main id="main-content" class="booking-container admin-layout">
    <section class="client-info admin-login-section" id="client-auth-section">
        <h3>Sign In</h3>
        <form id="client-login-form" novalidate>
            <div class="field-group">
                <label for="client-login-email">Email</label>
                <input type="email" id="client-login-email" required>
            </div>
            <div class="field-group">
                <label for="client-login-password">Password</label>
                <input type="password" id="client-login-password" minlength="8" required>
            </div>
            <button type="submit">Sign In</button>
            <p class="client-forgot-wrap"><a href="reset-password.html" class="client-forgot-link">Forgot password?</a></p>
        </form>

        <p class="client-create-link-wrap">
            <a href="create-account.html" class="client-create-link">Create Account</a>
        </p>

        <p id="client-auth-message" class="form-message" role="status" aria-live="polite"></p>
    </section>

    <div id="client-dashboard" class="admin-dashboard" hidden>
        <section class="calendar-booking">
            <h3>Your Appointments</h3>
            <p id="client-dashboard-message" class="form-message admin-dashboard-message" role="status" aria-live="polite"></p>
            <div class="table-wrapper admin-table-wrapper">
                <table id="client-appointments-table" class="admin-table">
                    <thead>
                        <tr>
                            <th scope="col">Date</th>
                            <th scope="col">Time</th>
                            <th scope="col">Services</th>
                            <th scope="col">Status</th>
                            <th scope="col">Action</th>
                        </tr>
                    </thead>
                    <tbody></tbody>
                </table>
            </div>

            <div id="client-reschedule-panel" class="client-reschedule-panel" hidden>
                <h4>Reschedule Appointment</h4>
                <p id="client-reschedule-target" class="client-reschedule-target"></p>
                <div class="field-group">
                    <label for="client-reschedule-date">Pick a New Date</label>
                    <input type="date" id="client-reschedule-date">
                </div>
                <div class="time-wrapper">
                    <label>Available Time Slots:</label>
                    <table class="time-slots-table" aria-label="Available reschedule times">
                        <tbody id="client-reschedule-slots" class="time-slots"></tbody>
                    </table>
                </div>
                <p id="client-reschedule-message" class="form-message" role="status" aria-live="polite"></p>
                <div class="client-reschedule-actions">
                    <button id="client-reschedule-save" type="button" disabled>Confirm Reschedule</button>
                    <button id="client-reschedule-cancel" type="button">Cancel</button>
                </div>
            </div>

            <button id="client-logout" type="button">Sign Out</button>
        </section>
    </div>
</main>

<script src="client.js"></script>
<script src="auth-menu.js"></script>
</body>
</html>
